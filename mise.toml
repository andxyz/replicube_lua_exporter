#:schema ./schema/mise.json
min_version = "2026.7.7"
# experimental_monorepo_root=true
monorepo_root = true

[monorepo]
config_roots = [
    "replicube_lua_exporter_golang",
    "replicube_lua_exporter_rust",
]

[tools]
go = "latest"
rust = "latest"

[tasks.copy_savegame]
description = "copy the savegame"
run = "cp ~/.local/share/Replicube/progress.dat ./test/large_progress.dat"

[tasks.dump]
depends = [":copy_savegame"]
description = "Uses golang to dump the contents of my savegame"
run = "mise //replicube_lua_exporter_golang:dump_mysavegame"
